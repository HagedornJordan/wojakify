<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wojackify</title>
  <style>
    body {
      margin: 24px;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #bbb;
      background: #fff;
    }

    label {
      display: grid;
      gap: 4px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
    }

    button,
    input[type="file"] {
      font: inherit;
    }

    button {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid #111;
      background: #fff;
      cursor: pointer;
    }

    button:disabled {
      color: #777;
      border-color: #aaa;
      cursor: not-allowed;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border: 1px solid #999;
      background: #ddd;
    }

    .note {
      margin: 8px 0 0;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>wojackify</h1>

    <div class="controls">
      <label>
        image
        <input id="upload" type="file" accept="image/*">
      </label>

      <label>
        wojack size
        <input id="size" type="range" min="10" max="100" value="45">
      </label>

      <label>
        x position
        <input id="x" type="range" min="0" max="100" value="50">
      </label>

      <label>
        y position
        <input id="y" type="range" min="0" max="100" value="50">
      </label>

      <button id="download" disabled>download</button>
      <p class="note" id="status">Pick an image, move the wojack around, then download the result.</p>
    </div>

    <canvas id="canvas" width="900" height="600"></canvas>
  </main>

    let userImage = null;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!userImage) {
        ctx.fillStyle = "#ddd";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#555";
        ctx.font = "24px Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("choose an image", canvas.width / 2, canvas.height / 2);
        return;
      }

      canvas.width = userImage.naturalWidth;
      canvas.height = userImage.naturalHeight;
      ctx.drawImage(userImage, 0, 0);

      if (!overlay.naturalWidth || !overlay.naturalHeight) return;

      const overlayWidth = canvas.width * (Number(size.value) / 100);
      const overlayHeight = overlayWidth * (overlay.naturalHeight / overlay.naturalWidth);
      const left = (canvas.width - overlayWidth) * (Number(x.value) / 100);
      const top = (canvas.height - overlayHeight) * (Number(y.value) / 100);

      ctx.drawImage(overlay, left, top, overlayWidth, overlayHeight);
    }

    upload.addEventListener("change", () => {
      const file = upload.files[0];
      if (!file) return;

      const image = new Image();
      image.onload = () => {
        userImage = image;
        download.disabled = false;
        draw();
        URL.revokeObjectURL(image.src);
      };
      image.src = URL.createObjectURL(file);
    });

    for (const input of [size, x, y]) {
      input.addEventListener("input", draw);
    }

    download.addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "wojackified.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    overlay.onload = draw;
    draw();
  </script>
